<!DOCTYPE html>
<html>
<head>
    <title>Create Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .form-card {
            max-width: 1000px;
            margin: auto;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg border-0 form-card">

        <div class="card-header bg-primary text-white text-center py-4">
            <h4 class="mb-1">Create New Ticket</h4>
            <small>Provide accurate details</small>
        </div>

        <div class="card-body px-4 py-4">
            <form method="post">
                {% csrf_token %}

                <!-- ROW 1 -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Ticket Type</label>
                        {{ form.ticket_type }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Raised By (Person Name)</label>
                        {{ form.raised_by_name }}
                    </div>
                </div>

                <!-- ROW 2 -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Shop No</label>
                        {{ form.shop_no }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Department</label>
                        {{ form.department }}
                    </div>
                </div>

                <!-- ROW 3 -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Sub Category</label>
                        {{ form.sub_category }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Priority</label>
                        {{ form.priority }}
                    </div>
                </div>

                <!-- ROW 4 -->
                <div class="row mb-3">
                    <div class="col-md-12">
                        <label class="form-label fw-semibold">Title</label>
                        {{ form.title }}
                    </div>
                </div>

                <!-- ROW 5 -->
                <div class="row mb-4">
                    <div class="col-md-12">
                        <label class="form-label fw-semibold">Description</label>
                        {{ form.description }}
                    </div>
                </div>

                <!-- ACTIONS -->
                <div class="d-flex justify-content-between">
                    <a href="{% url 'users:dashboard' %}" class="btn btn-outline-secondary px-4">
                        ← Back
                    </a>

                    <button type="submit" class="btn btn-success px-5">
                        Submit Ticket
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
