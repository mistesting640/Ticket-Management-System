<!DOCTYPE html>
<html>
<head>
    <title>Request Reassignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">Request Ticket Reassignment</h5>
                </div>

                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Reason</label>
                            <textarea name="comment"
                                      class="form-control"
                                      rows="4"
                                      placeholder="Explain why this ticket should be reassigned"
                                      required></textarea>
                        </div>

                        <button class="btn btn-warning w-100">
                            📤 Submit Reassignment Request
                        </button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'users:dashboard' %}" class="text-decoration-none">
                    ← Back to Dashboard
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
