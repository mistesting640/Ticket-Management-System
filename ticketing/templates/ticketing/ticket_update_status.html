<!DOCTYPE html>
<html>
<head>
    <title>Update Ticket Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Update Ticket Status</h4>
                    <small>Ticket #{{ ticket.ticket_id }}</small>
                </div>

                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Status</label>
                            <select name="status" class="form-select" required>
                                {% for key, val in status_choices %}
                                    <option value="{{ key }}"
                                        {% if ticket.status == key %}selected{% endif %}>
                                        {{ val }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Comment</label>
                            <textarea name="comment"
                                      class="form-control"
                                      rows="4"
                                      placeholder="Add update comment..."
                                      required></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'users:dashboard' %}"
                               class="btn btn-outline-secondary">
                                ← Back
                            </a>

                            <button type="submit"
                                    class="btn btn-success px-4">
                                Update Status
                            </button>
                        </div>
                    </form>
                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
