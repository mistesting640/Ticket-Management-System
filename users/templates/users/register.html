<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #198754, #0f5132);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background: #fff;
        }

        .auth-card h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="auth-card">
    <h3>Create Account</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input name="name" class="form-control" placeholder="Enter full name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control"
                   placeholder="Enter email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mobile Number</label>
            <input name="phone" class="form-control"
                   placeholder="Enter mobile number" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Business / Shop Name</label>
            <input name="business" class="form-control"
                   placeholder="Business or shop name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Project</label>
            <select name="project" class="form-select" required>
                <option value="">Select Project</option>
                {% for project in projects %}
                    <option value="{{ project.id }}">
                        {{ project.project_name }} ({{ project.location.location_name }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Create password" required>
        </div>

        <button type="submit" class="btn btn-success w-100">
            Register
        </button>
    </form>

    <div class="text-center mt-3">
        <small>
            Already have an account?
            <a href="{% url 'users:login' %}">Login</a>
        </small>
    </div>
</div>

</body>
</html>
